[package]
name = "pg-vm-pool"
version = "0.1.0"
edition = "2024"

[dependencies]
deadpool-postgres = "0.14.1"
tokio-postgres = "0.7"
# Path dep during development against the unreleased expose_tcp method.
# Switch back to `heyo-sdk = "0.1.3"` once that version is published.
heyo-sdk = { path = "../heyo/sdk-rs" }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
